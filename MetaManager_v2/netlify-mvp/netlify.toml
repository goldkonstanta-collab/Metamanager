[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/kp"
  to = "/.netlify/functions/generate-kp"
  status = 200

[[redirects]]
  from = "/api/contract"
  to = "/.netlify/functions/generate-contract"
  status = 200
